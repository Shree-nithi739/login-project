<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="container">

    <h2>User Login</h2>

    <form action="login.php"
          method="POST"
          onsubmit="return validateLogin();">

        <!-- Email -->

        <div class="input-group">

            <label>Email</label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter Email"
                required>

        </div>

        <!-- Password -->

        <div class="input-group">

            <label>Password</label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter Password"
                required>

        </div>

        <!-- Show Password -->

        <div class="input-group">

            <input
                type="checkbox"
                onclick="togglePassword('password')">

            Show Password

        </div>

        <!-- Login Button -->

        <button
            type="submit"
            class="btn">

            Login

        </button>

    </form>

    <div class="link">

        Don't have an account?

        <a href="register.html">

            Register

        </a>

    </div>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
